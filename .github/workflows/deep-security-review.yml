# factory-automation: 13cfcaf5-78c6-40d0-a982-f8208a96b199
name: Deep Security Review
"on":
  workflow_dispatch: {}
  schedule:
    - cron: 0 6 * * 1
permissions:
  contents: read
concurrency:
  group: droid-security-audit
  cancel-in-progress: false
jobs:
  security-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Install Factory Droid
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run deep security review
        run: droid exec --mission --auto high "/security-review across the entire repository"
        env:
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
      - name: Upload security review output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-security-review-${{ github.run_id }}
          path: ~/security-audits/
          if-no-files-found: warn
          retention-days: 90
